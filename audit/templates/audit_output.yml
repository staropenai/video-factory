# JTG 审计输出模板（audit_output.yml）
# 用途：每次任务完成后，Claude/Code 输出此格式
# 审计机器人读取此格式进行自动评分和路由

audit_output:
  # ─── 基本信息 ──────────────────────────────────────────────────────
  task_id: "TASK-YYYYMMDD-001"
  audited_at: "YYYY-MM-DDTHH:MM:SSZ"
  verdict: "pass"                        # pass | revise | block

  # ─── 问题清单 ──────────────────────────────────────────────────────
  findings:
    - id: "AUD-001"
      severity: "P0"                     # P0=必须修 | P1=重要 | P2=优化 | P3=建议
      category: "compliance"             # compliance|fact|logic|structure|risk|expression
      rule_ref: "IP-9"                   # 违反的规则 ID
      location: "src/components/XXX.tsx:42"
      problem: "【问题描述】"
      evidence: "【grep 结果或文件片段】"
      required_fix: "【具体修改建议】"

  # ─── 强制修复项 ────────────────────────────────────────────────────
  must_fix:                              # 所有 P0 问题的修复动作
    - "【修复项 1】"

  # ─── 评分 ──────────────────────────────────────────────────────────
  scores:
    fact_reliability: 0                  # 有未验证结论 ≤ 70
    logic_rigor: 0                       # 有逻辑跳跃，按严重度扣分
    structural_clarity: 0               # 无完成信号 ≤ 60
    risk_control: 0                      # 有待确认未阻断 ≤ 50
    ship_readiness: 0                    # 有 P0 问题 ≤ 40

  # ─── 发布决策 ──────────────────────────────────────────────────────
  release_decision: "do_not_ship"        # ship | do_not_ship
  release_blockers:                      # 阻止发布的问题
    - "【P0 问题描述】"

  # ─── 知识资产更新指令 ──────────────────────────────────────────────
  learning_updates:
    update_baseline: false               # 是否需要刷新 latest.json
    update_mnk_cards:                    # 需要更新的 MNK 卡
      - "audit/mnk_cards/XXX.md"
    create_pitfall: false                # 是否需要创建踩坑记录
    pitfall_summary: ""                  # 若需要，一句话描述这个坑
    propose_constraint_upgrade: false    # 是否建议升级为约束规则
    constraint_proposal: ""             # 若需要，描述建议新增的约束

  # ─── 下一轮任务种子 ────────────────────────────────────────────────
  next_task_seed:
    - "【下一步建议任务 1】"
    - "【下一步建议任务 2】"

---
# ═══════════════════════════════════════════════════════════════════
# 示例：一次通过的审计记录
# ═══════════════════════════════════════════════════════════════════

