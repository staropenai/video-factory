# .github/workflows/protected-paths.yml
# ⚠️ 模板 — 需启用分支保护后才有实际效果
name: Protected Path Guard
on:
  pull_request:
    branches: [main]
jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check protected paths
        run: |
          git diff --name-only origin/main...HEAD > changed.txt 2>/dev/null || git diff --name-only HEAD~1 > changed.txt
          PATTERNS=("src/lib/db/" "src/lib/router/" "src/lib/security/" "src/lib/auth/" "src/app/api/auth/" ".env" "vercel.json" "next.config")
          WARNINGS=0
          while IFS= read -r file; do
            for p in "${PATTERNS[@]}"; do
              if [[ "$file" == *"$p"* ]]; then
                echo "::warning::Protected path changed: $file (pattern: $p) — requires owner review"
                WARNINGS=$((WARNINGS + 1))
              fi
            done
          done < changed.txt
          echo "Protected path check complete. $WARNINGS warning(s)."
